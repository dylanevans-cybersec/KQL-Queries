name: Nightly KQL to Markdown Conversion (LM Studio)

on:
  schedule:
    - cron: '0 2 * * *'  # Runs nightly at 2:00 AM (local time on your machine)
  workflow_dispatch:      # Allows manual trigger from GitHub UI

jobs:
  convert-kql:
    # ⚠️ IMPORTANT: must be self-hosted so the runner can reach localhost:1234
    runs-on: self-hosted

    steps:
      - name: Checkout source repo (KQL detections)
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          path: source-repo

      - name: Checkout destination repo (Markdown output)
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          repository: ${{ secrets.DEST_REPO }}       # e.g. "your-org/detection-docs"
          token: ${{ secrets.DEST_REPO_TOKEN }}
          path: dest-repo

      - name: Install dependencies
        run: C:\Users\dylan\AppData\Local\Programs\Python\Python313\python.exe -m pip install openai gitpython
        shell: cmd

      - name: Check LM Studio is running
        run: C:\Users\dylan\AppData\Local\Programs\Python\Python313\python.exe -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:1234/v1/models')"
        shell: cmd

      - name: Run KQL to Markdown converter
        run: C:\Users\dylan\AppData\Local\Programs\Python\Python313\python.exe source-repo/scripts/convert_kql.py
        shell: cmd

      - name: Summary
        run: echo "KQL to Markdown conversion complete."
