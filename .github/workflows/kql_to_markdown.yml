name: Nightly KQL to Markdown Conversion (LM Studio)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  convert-kql:
    runs-on: self-hosted

    steps:
      - name: Checkout source repo (KQL detections)
        uses: actions/checkout@v4
        with:
          path: source-repo

      - name: Checkout destination repo (Markdown output)
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.DEST_REPO }}
          token: ${{ secrets.DEST_REPO_TOKEN }}
          path: dest-repo

      - name: Install dependencies
        run: '"C:\Program Files\Python313\python.exe" -m pip install openai gitpython'
        shell: cmd

      - name: Check LM Studio is running
        run: '"C:\Program Files\Python313\python.exe" -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:1234/v1/models\")"'
        shell: cmd

      - name: Run KQL to Markdown converter
        env:
          LM_STUDIO_URL:    "http://127.0.0.1:1234/v1"
          LM_STUDIO_MODEL:  "ministral-3-3b"
          SOURCE_DIR:       "source-repo"
          DEST_DIR:         "dest-repo/content/detections"
          GIT_AUTHOR_NAME:  "KQL Bot"
          GIT_AUTHOR_EMAIL: "kql-bot@noreply.github.com"
        run: '"C:\Program Files\Python313\python.exe" source-repo/scripts/convert_kql.py'
        shell: cmd

      - name: Summary
        run: echo "KQL to Markdown conversion complete."
        shell: cmd